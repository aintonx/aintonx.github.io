:root{color-scheme:dark;--void:#04040a;--surface:#101026;--line:rgba(240,240,248,.12);--ink:#f0f0f8;--muted:#8e8eb0;--red:#c02828;--cyan:#00c8c8;--font-display:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--font-mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;}

.ew-brand{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:32px;}

.ew-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 14px var(--cyan);animation:pulse 1.7s ease-in-out infinite;}
h1{font-family:var(--font-display);font-size:clamp(25px,7vw,42px);line-height:.96;letter-spacing:-.03em;margin-bottom:16px;}
p{color:#b9b9d2;font-size:11px;line-height:1.8;letter-spacing:.03em;max-width:420px;}
a{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,200,200,.35)}
.ew-lines{margin-top:24px;display:grid;gap:9px;color:rgba(240,240,248,.34);font-size:8px;letter-spacing:.18em;text-transform:uppercase;}
.ew-lines i{display:block;height:1px;background:linear-gradient(90deg,rgba(192,40,40,.65),rgba(0,200,200,.25),transparent)}
@keyframes gateIn{from{opacity:0;transform:translateY(12px) scale(.985);filter:blur(3px)}to{opacity:1;transform:none;filter:none}}
@keyframes scan{to{background-position:-220% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.28}}
@media (prefers-reduced-motion:reduce){.ew-gate,.ew-dot,.ew-gate::before{animation:none}}
