name: Deploy EchoWorld to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp CNAME _site/
          cp robots.txt sitemap.xml _site/
          cp google2b2d6009cdd50ffc.html yandex_60dacd027860a3c7.html _site/
          cp -R logo share img Character _site/
          cp logo/apple-touch-icon-r20260703b.png _site/apple-touch-icon.png
          cp logo/apple-touch-icon-r20260703b.png _site/apple-touch-icon-precomposed.png
          cp logo/apple-touch-icon-r20260703b.png _site/apple-touch-icon-180x180.png
          cp logo/apple-touch-icon-r20260703b.png _site/apple-touch-icon-r20260703b.png
          cp logo/favicon-dark-r20260703b.ico _site/favicon.ico
          cp logo/favicon-dark-r20260703b.ico _site/favicon-r20260703b.ico
          cp logo/favicon-dark-r20260703b.svg _site/favicon.svg
          cp logo/favicon-dark-r20260703b.svg _site/favicon-r20260703b.svg
          cp logo/favicon-32x32-r20260703b.png _site/favicon-32x32.png
          cp logo/favicon-32x32-r20260703b.png _site/favicon-32x32-r20260703b.png
          cp logo/favicon-16x16-r20260703b.png _site/favicon-16x16.png
          cp logo/favicon-16x16-r20260703b.png _site/favicon-16x16-r20260703b.png
          find _site -name .DS_Store -delete

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
